# ============================================================================
# Production stack — 홈서버(Mac mini) 전용
#
# 프론트엔드(order, console)는 Vercel에 배포되므로 여기에 포함하지 않습니다.
# 공개 진입점은 Cloudflare Tunnel입니다(아웃바운드 터널 + TLS는 Cloudflare가 처리).
#   → 커스텀 도메인 api.ssurak.com 을 홈서버 ssurak:8080 에 매핑(대시보드에서 설정).
#   → 포트포워딩/유동 IP/헤어핀 불필요, WebSocket 지원, 인바운드 포트 0.
#   → MySQL/Redis/ssurak 모두 비공개. order/console와 api 가 같은 등록가능도메인
#     (예: order.ssurak.com / console.ssurak.com / api.ssurak.com)이라 쿠키가 same-site.
#
#   배포:  docker compose up -d --build
#   개발:  docker compose -f docker-compose.dev.yml up
#
# 필요한 .env 값:
#   DB_ROOT_PASSWORD, DB_NAME, DB_USER, DB_PASSWORD
#   REDIS_PASSWORD
#   JWT_* (access/refresh secret 등 기존 값)
#   ORDER_APP_URL=https://order.ssurak.com         # CORS 허용 오리진
#   CONSOLE_APP_URL=https://console.ssurak.com   # CORS 허용 오리진
#   COOKIE_DOMAIN=.ssurak.com                      # 쿠키 도메인(서브도메인 공유, 예: .ssurak.com)
#   CLOUDFLARE_TUNNEL_TOKEN=eyJ...                  # 터널 토큰(긴 eyJ... 문자열, ID 아님)
# ============================================================================

services:
  mysql:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    container_name: ssurak-mysql
    restart: unless-stopped
    command:
      # 운영용: 내구성 우선 설정
      - --innodb_flush_log_at_trx_commit=1
      - --sync_binlog=1
      - --binlog_expire_logs_seconds=604800 # 7 days
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # 공개 포트 없음. 로컬 디버깅이 필요할 때만 아래 주석 해제(루프백 바인딩).
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spaceorder-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: ssurak-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - spaceorder-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prisma 마이그레이션 1회성 실행.
  # runner 이미지는 schema/CLI를 포함하지 않으므로, schema가 있는 development
  # 타깃을 재사용해 migrate deploy만 수행하고 종료한다.
  migrate:
    build:
      context: .
      dockerfile: apps/ssurak/Dockerfile
      target: development
    container_name: ssurak-migrate
    command:
      [
        "sh",
        "-c",
        "corepack enable pnpm && pnpm --filter=@spaceorder/db exec prisma migrate deploy",
      ]
    environment:
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - spaceorder-network
    env_file:
      - .env
    restart: "no"

  ssurak:
    image: ssurak-api
    build:
      context: .
      dockerfile: apps/ssurak/Dockerfile
      target: prod # ts-node transpile 로더로 소스 직접 실행(워치 제외)
    container_name: ssurak-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      REDIS_HOST: redis
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - spaceorder-network
    env_file:
      - .env

  # Cloudflare Tunnel — 공개 진입점.
  # api.ssurak.com → (Cloudflare 엣지) → 아웃바운드 터널 → http://ssurak:8080.
  # 인바운드 포트를 열지 않고 TLS/도메인은 Cloudflare가 처리한다. WebSocket 지원.
  #
  # 사전 작업(Cloudflare Zero Trust 대시보드):
  #   1) Networks → Tunnels → Create a tunnel (cloudflared 타입)
  #   2) Public Hostname 추가: api.ssurak.com  →  Service: http://ssurak:8080
  #   3) 발급된 토큰(긴 eyJ... 문자열)을 .env 의 CLOUDFLARE_TUNNEL_TOKEN 에 넣는다.
  #      (Tunnel ID / Replica ID 가 아니라, --token 뒤에 오는 그 긴 문자열)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ssurak-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ssurak
    networks:
      - spaceorder-network

networks:
  spaceorder-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
