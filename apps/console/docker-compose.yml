version: "3.8"

services:
  # Next.js Frontend (console app) - Production
  console:
    image: ssurak-console-frontend:prod
    build:
      context: ../../
      dockerfile: apps/console/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_IMAGE_HOSTNAME: ${NEXT_PUBLIC_IMAGE_HOSTNAME}
    container_name: ssurak-console-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: "0.0.0.0"
    expose:
      - "3001"
    networks:
      - frontend-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ssurak-console-nginx
    restart: unless-stopped
    ports:
      - "81:81"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - console
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge
