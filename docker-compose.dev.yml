services:
  # MySQL Database for development
  mysql:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    container_name: ssurak-dev-mysql
    restart: unless-stopped
    command:
      - --skip-log-bin
      - --sync_binlog=0
      - --innodb_flush_log_at_trx_commit=2
      - --innodb_temp_data_file_path=ibtmp1:64M:autoextend:max:512M
      # prod.yaml
      # command:
      #   - --innodb_flush_log_at_trx_commit=1
      #   - --sync_binlog=1
      #   - --binlog_expire_logs_seconds = 604800 # 7 days
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - ssurak-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  # Redis Cache
  redis:
    image: redis:7.0-alpine
    container_name: ssurak-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ssurak-network

  # NestJS Backend (ssurak app) - Development
  ssurak:
    image: ssurak-api-dev
    build:
      context: .
      dockerfile: apps/ssurak/Dockerfile
      target: development
    container_name: ssurak-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      RUN_PRISMA_SEED: ${RUN_PRISMA_SEED}
      REDIS_HOST: redis
      ORDER_APP_URL: http://localhost:3000
      CONSOLE_APP_URL: http://localhost:3001
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ssurak-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/ssurak/node_modules
    env_file:
      - .env

  # Next.js Frontend (console app) - Development
  console:
    image: console-fe-dev
    build:
      context: .
      dockerfile: apps/console/Dockerfile
      target: development
    container_name: console-fe-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_PUBLIC_SSURAK_INTERNAL_URL: http://ssurak:8080
      NEXT_PUBLIC_ORDER_APP_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/console/node_modules
      - /app/.next
      - /app/apps/console/.next
    depends_on:
      - ssurak
    networks:
      - ssurak-network
    env_file:
      - .env

  # Next.js Frontend (order app) - Development
  order:
    image: order-fe-dev
    build:
      context: .
      dockerfile: apps/order/Dockerfile
      target: development
    container_name: order-fe-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_SSURAK_INTERNAL_URL: http://ssurak:8080
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/order/node_modules
      - /app/.next
      - /app/apps/order/.next
    depends_on:
      - ssurak
    networks:
      - ssurak-network
    env_file:
      - .env

  # Prisma Studio - Database GUI
  # prisma-studio:
  #   build:
  #     context: .
  #     dockerfile: apps/ssurak/Dockerfile
  #     target: development
  #   container_name: ssurak-prisma-studio
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
  #   ports:
  #     - "5555:5555"
  #   command: ["pnpm", "prisma:studio", "--", "--port", "5555"]
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #   networks:
  #     - ssurak-network
  #   env_file:
  #     - .env

networks:
  ssurak-network:
    driver: bridge

volumes:
  mysql_dev_data:
    driver: local
  redis_data:
    driver: local
